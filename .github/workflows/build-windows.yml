name: Build Windows FLASH

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test-and-build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller

      - name: Run tests
        run: python -m pytest -q

      - name: Build windowed executable
        run: python -m PyInstaller --clean --noconfirm FLASH.spec

      - name: Verify executable exists
        shell: pwsh
        run: |
          if (-not (Test-Path 'dist/FLASH.exe')) {
            throw 'dist/FLASH.exe was not created.'
          }
          Get-Item 'dist/FLASH.exe' | Format-List Name,Length,LastWriteTime

      - name: Upload Windows executable
        uses: actions/upload-artifact@v4
        with:
          name: FLASH-Windows-SP1
          path: dist/FLASH.exe
          if-no-files-found: error
          retention-days: 30
